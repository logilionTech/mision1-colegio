<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam System PRO | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="ph ph-brain"></i>
                <span>AI Exam PRO</span>
            </div>
            <h2>Iniciar Sesión</h2>
            <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-with-icon">
                        <i class="ph ph-envelope"></i>
                        <input type="email" id="email" required placeholder="tu@correo.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-with-icon">
                        <i class="ph ph-lock"></i>
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" class="toggle-password"><i class="ph ph-eye"></i></button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Mantener sesión iniciada</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Ingresar <i class="ph ph-sign-in"></i>
                </button>
                
                <div id="authMessage" class="auth-message"></div>
            </form>
            
            <div class="auth-footer">
                <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
                <p><a href="admin/login.html" class="admin-link">Acceso Administrador</a></p>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
