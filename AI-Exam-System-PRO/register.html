<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam System PRO | Registro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="ph ph-brain"></i>
                <span>AI Exam PRO</span>
            </div>
            <h2>Registro de Estudiante</h2>
            <p class="auth-subtitle">Crea tu cuenta para acceder a los exámenes</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="reg-name">Nombre Completo</label>
                    <div class="input-with-icon">
                        <i class="ph ph-user"></i>
                        <input type="text" id="reg-name" required placeholder="Ej. Juan Pérez">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <div class="input-with-icon">
                        <i class="ph ph-envelope"></i>
                        <input type="email" id="reg-email" required placeholder="tu@correo.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <div class="input-with-icon">
                        <i class="ph ph-lock"></i>
                        <input type="password" id="reg-password" required placeholder="••••••••">
                        <button type="button" class="toggle-password"><i class="ph ph-eye"></i></button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="reg-password-confirm">Confirmar Contraseña</label>
                    <div class="input-with-icon">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="reg-password-confirm" required placeholder="••••••••">
                        <button type="button" class="toggle-password"><i class="ph ph-eye"></i></button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    Registrarse <i class="ph ph-user-plus"></i>
                </button>
                
                <div id="authMessage" class="auth-message"></div>
            </form>
            
            <div class="auth-footer">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión</a></p>
            </div>
        </div>
    </div>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
